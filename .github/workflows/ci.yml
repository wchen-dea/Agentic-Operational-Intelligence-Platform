name: CI

on:
  push:
    branches: ["main", "prd", "develop"]
  pull_request:
    branches: ["main", "prd"]

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  lint:
  # -----------------------------------------------------------------------
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --frozen --dev
      - name: Ruff lint
        run: uv run ruff check . --output-format=github
      - name: Ruff format check
        run: uv run ruff format --check .

  # -----------------------------------------------------------------------
  typecheck:
  # -----------------------------------------------------------------------
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --frozen --dev
      - name: Pyright
        run: uv run pyright
        continue-on-error: true   # informational until full type coverage

  # -----------------------------------------------------------------------
  test:
  # -----------------------------------------------------------------------
    name: Test & Coverage
    runs-on: ubuntu-latest
    env:
      AOIP_AUTH_DISABLED: "true"
      AOIP_KPI_SOURCE: "sqlite"
      AOIP_REDIS__URL: ""
      AOIP_TEAMS__WEBHOOK_URL: ""
      AOIP_OTEL__ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - name: Install all dependency groups
        run: uv sync --frozen --dev --group generator
      - name: Run tests with coverage
        run: >
          uv run pytest tests/
          --cov=ai_layer
          --cov=services
          --cov=alerts
          --cov=data_platform
          --cov=observability
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=40
          -x
          --tb=short
          -q
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  # -----------------------------------------------------------------------
  docker:
  # -----------------------------------------------------------------------
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: container/Dockerfile
          push: false
          tags: aoip:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test
        run: |
          docker run -d --name aoip-smoke -p 8000:8000 \
            -e AOIP_AUTH_DISABLED=true \
            -e AOIP_KPI_SOURCE=sqlite \
            aoip:ci-${{ github.sha }}
          sleep 8
          curl -f http://localhost:8000/health || (docker logs aoip-smoke && exit 1)
          docker stop aoip-smoke

