name: CI

on:
  push:
    branches: [prd]
  pull_request:
    branches: [prd]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check . --output-format=github
        continue-on-error: true

      - name: Type check (pyright)
        run: uv run pyright

      - name: Run tests
        run: uv run pytest -q --tb=short

      - name: Test coverage
        run: uv run pytest --cov=ai_layer --cov=services --cov=alerts --cov=data_platform --cov-report=term-missing --cov-fail-under=60
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f container/Dockerfile -t aoip:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name aoip-test -p 8000:8000 -e AOIP_AUTH_DISABLED=true aoip:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs aoip-test && exit 1)
          docker stop aoip-test
