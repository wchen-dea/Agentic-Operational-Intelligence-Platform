global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
- /etc/prometheus/alerts.yml
scrape_configs:
- job_name: aoip_app
  metrics_path: /metrics
  authorization:
    type: Bearer
    credentials: aoip-local-admin
  static_configs:
  - targets: ["app:8000"]
- job_name: blackbox_http
  metrics_path: /probe
  params:
    module: [http_2xx]
  static_configs:
  - targets:
    - http://flink-jobmanager:8081/overview
    - http://spark-master:8080
    - http://airflow-webserver:8080/health
    - http://kafka-connect:8083/connectors
    - http://schema-registry:8081/subjects
    - http://qdrant:6333/healthz
  relabel_configs:
  - source_labels: [__address__]
    target_label: __param_target
  - source_labels: [__param_target]
    target_label: instance
  - target_label: __address__
    replacement: blackbox-exporter:9115
- job_name: blackbox_tcp
  metrics_path: /probe
  params:
    module: [tcp_connect]
  static_configs:
  - targets:
    - spark-thriftserver:10000
    - mysql:3306
    - redis:6379
  relabel_configs:
  - source_labels: [__address__]
    target_label: __param_target
  - source_labels: [__param_target]
    target_label: instance
  - target_label: __address__
    replacement: blackbox-exporter:9115