aurora_mysql:
  host: aurora-cluster.cluster-xxxxxxxxxxxx.us-east-1.rds.amazonaws.com
  port: 3306
  database: retail_ops
  username: aurora_app_user
  password_secret_name: aurora/mysql/app-user
  tables:
    sales_orders: sales_orders
    appointments: appointments
    pos_invoices: pos_invoices
    work_orders: work_orders
    article_inventory: article_inventory
cdc:
  mode: aurora_mysql_cdc
  connector: aws_dms
  transport: kafka_msk
  topic_prefix: cdc
  topic_pattern: cdc_<table>
  bronze_table_pattern: bronze.<table>_cdc
  silver_table_pattern: silver.<table>
  checkpoint_location: dbfs:/checkpoints/aurora_mysql_cdc
  watermark_delay_seconds: 60
  sample_task_spec: config/cdc/aws_dms_aurora_to_msk_task.example.json
lakehouse:
  bronze_schema: bronze
  silver_schema: silver
  gold_schema: gold